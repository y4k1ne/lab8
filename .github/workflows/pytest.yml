name: Run pytest

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: uv pip install --system pytest pydantic

      - run: pytest lab4_test.py -v
